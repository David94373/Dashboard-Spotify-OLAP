{% extends "base.html" %}
{% set pagina = 'v3' %}

{% block contenido %}
<h1>Vista 3 — Artistas más escuchados</h1>
<p class="descripcion">Los 8 artistas con mayor total de streams acumulados.</p>
<span class="etiqueta-olap">Operación OLAP: Roll-Up</span>

<div class="caja-grafica">
  <h2>Gráfica de pastel</h2>
  <canvas id="miGrafica" style="max-height:300px"></canvas>
</div>

<div class="caja-grafica">
  <h2>Tabla de datos</h2>
  <table>
    <tr>
      <th>#</th>
      <th>Artista</th>
      <th>Total Streams</th>
    </tr>
    <tbody id="miTabla"></tbody>
  </table>
</div>

<script>
const COLORES = ['#1DB954','#2196F3','#E91E63','#FF9800','#9C27B0','#00BCD4','#F44336','#FFC107'];

fetch('/api/artistas')
  .then(r => r.json())
  .then(datos => {

    const ctx = document.getElementById('miGrafica').getContext('2d');
    new Chart(ctx, {
      type: 'pie',
      data: {
        labels: datos.map(d => d.Artist),
        datasets: [{
          data: datos.map(d => d.Total),
          backgroundColor: COLORES
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'right' }
        }
      }
    });

    // Tabla
    const tabla = document.getElementById('miTabla');
    datos.forEach((d, i) => {
      tabla.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${d.Artist}</td>
          <td>${Number(d.Total).toLocaleString()}</td>
        </tr>`;
    });

  });
</script>
{% endblock %}
