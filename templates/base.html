<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Spotify OLAP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    /* Barra de navegación */
    nav {
      background-color: #1DB954;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    nav span {
      color: white;
      font-weight: bold;
      font-size: 18px;
      margin-right: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
    }

    nav a:hover {
      background-color: rgba(255,255,255,0.2);
    }

    nav a.activo {
      background-color: white;
      color: #1DB954;
      font-weight: bold;
    }

    /* Contenido principal */
    .contenido {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h1 {
      color: #333;
      font-size: 22px;
      margin-bottom: 6px;
    }

    p.descripcion {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* Caja del gráfico */
    .caja-grafica {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .caja-grafica h2 {
      font-size: 16px;
      color: #444;
      margin: 0 0 16px 0;
    }

    canvas {
      max-height: 350px;
    }

    /* Tabla simple */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background-color: #1DB954;
      color: white;
      padding: 10px 12px;
      text-align: left;
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid #eee;
      color: #333;
    }

    tr:hover td {
      background-color: #f9f9f9;
    }

    /* Etiqueta de operación OLAP */
    .etiqueta-olap {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<nav>
  <span>Spotify OLAP</span>
  <a href="/" {% if pagina == 'inicio' %}class="activo"{% endif %}>Inicio</a>
  <a href="/vista1" {% if pagina == 'v1' %}class="activo"{% endif %}>Top 10</a>
  <a href="/vista2" {% if pagina == 'v2' %}class="activo"{% endif %}>Plataformas</a>
  <a href="/vista3" {% if pagina == 'v3' %}class="activo"{% endif %}>Artistas</a>
  <a href="/vista4" {% if pagina == 'v4' %}class="activo"{% endif %}>Por Mes</a>
  <a href="/vista5" {% if pagina == 'v5' %}class="activo"{% endif %}>Playlists</a>
  <a href="/vista6" {% if pagina == 'v6' %}class="activo"{% endif %}>Consulta Personalizada</a>
</nav>

<div class="contenido">
  {% block contenido %}{% endblock %}
</div>

</body>
</html>
